<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VE - E-Commerce Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>VE</h1>
            </div>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <div class="nav-menu" id="primary-menu">
                <a href="index.html">Products</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
                <a href="#" id="auth-link">Login</a>
                <a href="status.html">Status</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h2>Welcome to VE</h2>
            <p>Your one-stop shop for quality products</p>
        </div>
    </section>

    <!-- Search and Filter -->
    <section class="filters">
        <div class="container">
            <div class="search-bar">
                <input type="text" id="search" placeholder="Search products..." />
                <button onclick="searchProducts()">Search</button>
            </div>
            <div class="filter-controls">
                <select id="category-filter" onchange="filterProducts()">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="home">Home & Garden</option>
                </select>
                <select id="sort-select" onchange="filterProducts()">
                    <option value="name_asc">Name (A-Z)</option>
                    <option value="name_desc">Name (Z-A)</option>
                    <option value="price_asc">Price (Low to High)</option>
                    <option value="price_desc">Price (High to Low)</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="products">
        <div class="container">
            <div id="products-grid" class="products-grid">
                <!-- Products will be loaded here dynamically -->
            </div>
            <div id="loading" class="loading" style="display: none;">
                Loading products...
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 VE - E-Commerce Platform. All rights reserved.</p>
            <p>Built with VE Resources Library</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
</body>

</html>
