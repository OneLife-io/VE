<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - VE</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>VE</h1>
            </div>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
            <div class="nav-menu" id="primary-menu">
                <a href="index.html">Products</a>
                <a href="cart.html" class="active">Cart (<span id="cart-count">0</span>)</a>
                <a href="#" id="auth-link">Login</a>
                <a href="status.html">Status</a>
            </div>
        </div>
    </nav>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="container">
            <h2>Shopping Cart</h2>

            <div id="cart-items" class="cart-items">
                <!-- Cart items will be loaded here -->
            </div>

            <div id="cart-empty" class="cart-empty" style="display: none;">
                <p>Your cart is empty</p>
                <a href="index.html" class="btn btn-primary">Continue Shopping</a>
            </div>

            <div id="cart-summary" class="cart-summary" style="display: none;">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (8%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <button class="btn btn-primary btn-block" onclick="checkout()">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 VE - E-Commerce Platform. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
</body>

</html>
